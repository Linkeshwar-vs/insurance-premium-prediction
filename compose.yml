services:

  postgres:

    image: postgres:17

    environment:
      POSTGRES_USER: linkeshwar
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insurance_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

  fastapi1:

    build: .

    environment:
      SERVER_ID: FastAPI-1

    depends_on:
      - postgres


  nginx:

    image: nginx:latest

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - fastapi1

volumes:

  postgres_data:
