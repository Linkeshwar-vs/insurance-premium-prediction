name: FastAPI CI

on:
  push:
    branches:
      - main

jobs:
  validation:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -c "from app import app"

      - run: docker build -t insurance-api .


